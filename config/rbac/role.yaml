---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - firewall.opnsense.io
  resources:
  - aliases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - firewall.opnsense.io
  resources:
  - aliases/finalizers
  verbs:
  - update
- apiGroups:
  - firewall.opnsense.io
  resources:
  - aliases/status
  verbs:
  - get
  - patch
  - update
