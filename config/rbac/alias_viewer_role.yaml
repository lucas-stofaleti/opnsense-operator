# This rule is not used by the project opnsense-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to firewall.opnsense.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: opnsense-operator
    app.kubernetes.io/managed-by: kustomize
  name: alias-viewer-role
rules:
- apiGroups:
  - firewall.opnsense.io
  resources:
  - aliases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - firewall.opnsense.io
  resources:
  - aliases/status
  verbs:
  - get
